name: Question or blocker
description: Ask for clarification or report a blocker.
title: "[Question/Blocker] "
labels: ["blocked"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Type
      options:
        - Question
        - Blocker
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: blocking
    attributes:
      label: What is blocked?
      description: Describe the failure point or missing decision.
    validations:
      required: true
  - type: textarea
    id: help
    attributes:
      label: Requested decision or help
      description: What specific answer do you need?
    validations:
      required: true
  - type: textarea
    id: related_issues
    attributes:
      label: Related issues reviewed
      description: List related issues reviewed before opening this issue. Use issue numbers like #123, or write `None found after search`.
    validations:
      required: true
  - type: textarea
    id: related_prs
    attributes:
      label: Related PRs reviewed
      description: List related PRs reviewed before opening this issue. Use PR numbers like #123, or write `None found after search`.
    validations:
      required: true
  - type: dropdown
    id: overlap
    attributes:
      label: Overlap classification
      description: Choose the best overlap classification for this issue.
      options:
        - none
        - duplicate
        - alternative approach
        - complementary follow-up
        - narrower fix
        - superseding
    validations:
      required: true
  - type: textarea
    id: still_needed
    attributes:
      label: Why this issue is still needed
      description: If related work exists, explain why this issue should still be tracked separately.
    validations:
      required: true
  - type: dropdown
    id: proposed_track
    attributes:
      label: Proposed track
      description: Maintainers will assign the final track label.
      options:
        - Track: Cross-Platform
        - Track: OG Onboarding
        - Track: Integration
        - Track: Stability
    validations:
      required: true
