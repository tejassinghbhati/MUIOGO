name: Bug report
description: Report a reproducible defect.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact commands or UI steps.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, branch or commit if relevant.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Paste relevant output or links to screenshots.
    validations:
      required: false
  - type: textarea
    id: related_work
    attributes:
      label: Related work checked
      description: List anything relevant you checked before opening this issue. Use issue/PR numbers like #123, or write `None found after search`.
    validations:
      required: false
  - type: dropdown
    id: proposed_track
    attributes:
      label: Proposed track
      description: Optional. Maintainers will assign the final track label.
      options:
        - Track: Cross-Platform
        - Track: OG Onboarding
        - Track: Integration
        - Track: Stability
    validations:
      required: false
